<main class="h-screen w-screen">
  <div class="flex flex-col h-full">
    <header
      class="flex items-center justify-between p-4 border-b border-gray-200"
    >
      <!-- Logo/Título -->
      <div class="flex items-center gap-3 pr-4">
        <div class="relative">
          <div
            class="w-10 h-10 bg-blue-100 rounded-full flex items-center justify-center"
          >
            <i class="fa-solid fa-hospital text-blue-600 text-lg"></i>
          </div>
          <span
            class="absolute -bottom-0.5 -right-0.5 w-2.5 h-2.5 bg-green-400 border-2 border-white rounded-full"
          ></span>
        </div>
        <div class="min-w-0">
          <h2
            class="font-semibold text-gray-800 text-xl mi-fuente tracking-wide"
          >
            VitaCare Administrador
          </h2>
          <p class="text-xs text-gray-500">Sistema de gestión médica</p>
        </div>
      </div>

      <!-- Navegación centrada -->
      <nav
        class="flex items-center gap-1 bg-gray-100 rounded-lg p-1 border border-gray-200"
      >
        <a
          routerLink="/admin/usuarios"
          routerLinkActive="text-[#347AF0] bg-gray-50"
          class="font-medium text-sm text-gray-600 px-4 py-2 rounded-md transition-all duration-200 hover:text-[#347AF0] hover:bg-gray-50"
        >
          <i class="fa-solid fa-users mr-2 text-xs"></i>
          Usuarios
        </a>

        <a
          routerLink="/admin/configuracion"
          routerLinkActive="text-[#347AF0] bg-gray-50"
          class="font-medium text-sm text-gray-600 px-4 py-2 rounded-md transition-all duration-200 hover:text-[#347AF0] hover:bg-gray-50"
        >
          <i class="fa-solid fa-gear mr-2 text-xs"></i>
          Configuración
        </a>

        <a
          routerLink="/admin/reportes"
          routerLinkActive="text-[#347AF0] bg-gray-50"
          class="font-medium text-sm text-gray-600 px-4 py-2 rounded-md transition-all duration-200 hover:text-[#347AF0] hover:bg-gray-50"
        >
          <i class="fa-solid fa-chart-bar mr-2 text-xs"></i>
          Reportes
        </a>

        <a
          routerLink="/admin/doctores"
          routerLinkActive="text-[#347AF0] bg-gray-50"
          class="font-medium text-sm text-gray-600 px-4 py-2 rounded-md transition-all duration-200 hover:text-[#347AF0] hover:bg-gray-50"
        >
          <i class="fa-solid fa-user-doctor mr-2 text-xs"></i>
          Doctores
        </a>
      </nav>

      <!-- Perfil y logout -->
      <div class="flex items-center gap-2 pl-4 border-l border-gray-200">
        <div class="flex items-center gap-2">
          <div
            class="w-8 h-8 bg-gray-100 rounded-full flex items-center justify-center"
          >
            <i class="fa-solid fa-user-shield text-gray-600 text-sm"></i>
          </div>
          <span class="text-sm font-medium text-gray-700">Admin</span>
        </div>

        <button
          class="flex items-center justify-center w-8 h-8 border border-gray-300 text-gray-400 hover:text-red-600 hover:bg-red-50 hover:border-red-300 transition-colors duration-200 rounded-sm"
          aria-label="Cerrar sesión"
          title="Cerrar sesión"
          type="button"
          (click)="logout()"
        >
          <i class="fa-solid fa-right-from-bracket text-sm"></i>
        </button>
      </div>
    </header>

    <section class="flex-1">
      <router-outlet></router-outlet>
    </section>
  </div>
</main>
