<div
  class="w-full h-full flex flex-col bg-white rounded-lg border border-gray-200 overflow-hidden"
>
  <!-- Layout de dos columnas que ocupa toda la altura -->
  <div class="flex-1 grid grid-cols-1 lg:grid-cols-2 gap-6 p-6 min-h-0">
    <!-- Columna izquierda: Formulario con scroll -->
    <div class="flex flex-col min-h-0">
      <div class="flex-1 overflow-y-auto space-y-6 pr-2">
        <!-- Lista de Medicamentos -->
        <div>
          <div class="flex items-center justify-between mb-4">
            <h3 class="text-lg font-semibold text-gray-800">Medicamentos</h3>
            <button
              type="button"
              class="px-3 py-1.5 bg-green-500 text-white text-sm font-medium rounded-lg hover:bg-green-600 transition-colors flex items-center gap-1"
            >
              <i class="fa-solid fa-plus text-xs"></i>
              Agregar
            </button>
          </div>

          <!-- Medicamento 1 -->
          <div
            class="border border-gray-200 rounded-lg p-3 mb-3 bg-white shadow-sm"
          >
            <div class="grid grid-cols-2 gap-3 mb-3">
              <div>
                <label class="block text-xs font-medium text-gray-700 mb-1"
                  >Medicamento</label
                >
                <input
                  type="text"
                  class="w-full px-2 py-1.5 border border-gray-300 rounded text-sm focus:ring-1 focus:ring-blue-500 focus:border-blue-500 outline-none"
                  value="Salbutamol"
                  placeholder="Nombre"
                />
              </div>
              <div>
                <label class="block text-xs font-medium text-gray-700 mb-1"
                  >Presentación</label
                >
                <input
                  type="text"
                  class="w-full px-2 py-1.5 border border-gray-300 rounded text-sm focus:ring-1 focus:ring-blue-500 focus:border-blue-500 outline-none"
                  value="Inhalador"
                  placeholder="Forma"
                />
              </div>
            </div>

            <div class="grid grid-cols-3 gap-2 mb-3">
              <div>
                <label class="block text-xs font-medium text-gray-700 mb-1"
                  >Dosis</label
                >
                <input
                  type="text"
                  class="w-full px-2 py-1.5 border border-gray-300 rounded text-sm focus:ring-1 focus:ring-blue-500 focus:border-blue-500 outline-none"
                  value="2 inhalaciones"
                  placeholder="Por toma"
                />
              </div>
              <div>
                <label class="block text-xs font-medium text-gray-700 mb-1"
                  >Cada</label
                >
                <div class="flex gap-1">
                  <input
                    type="number"
                    class="w-12 px-2 py-1.5 border border-gray-300 rounded text-sm focus:ring-1 focus:ring-blue-500 focus:border-blue-500 outline-none"
                    value="6"
                    min="1"
                    max="24"
                  />
                  <span class="flex items-center text-gray-600 text-xs"
                    >hrs</span
                  >
                </div>
              </div>
              <div>
                <label class="block text-xs font-medium text-gray-700 mb-1"
                  >Durante</label
                >
                <div class="flex gap-1">
                  <input
                    type="number"
                    class="w-12 px-2 py-1.5 border border-gray-300 rounded text-sm focus:ring-1 focus:ring-blue-500 focus:border-blue-500 outline-none"
                    value="7"
                    min="1"
                  />
                  <span class="flex items-center text-gray-600 text-xs"
                    >días</span
                  >
                </div>
              </div>
            </div>

            <div class="grid grid-cols-2 gap-2">
              <div>
                <label class="block text-xs font-medium text-gray-700 mb-1"
                  >Vía</label
                >
                <select
                  class="w-full px-2 py-1.5 border border-gray-300 rounded text-sm focus:ring-1 focus:ring-blue-500 focus:border-blue-500 outline-none"
                >
                  <option>Oral</option>
                  <option selected>Inhalatoria</option>
                  <option>Subcutánea</option>
                </select>
              </div>
              <div>
                <label class="block text-xs font-medium text-gray-700 mb-1"
                  >Indicaciones</label
                >
                <input
                  type="text"
                  class="w-full px-2 py-1.5 border border-gray-300 rounded text-sm focus:ring-1 focus:ring-blue-500 focus:border-blue-500 outline-none"
                  placeholder="Adicionales"
                />
              </div>
            </div>

            <div class="flex justify-end mt-2">
              <button
                type="button"
                class="px-2 py-1 bg-red-500 text-white text-xs rounded hover:bg-red-600 transition-colors flex items-center gap-1"
              >
                <i class="fa-solid fa-trash text-xs"></i>
                Eliminar
              </button>
            </div>
          </div>

          <!-- Botón agregar más -->
          <button
            type="button"
            class="px-3 py-2 border-2 border-dashed border-gray-300 text-gray-500 rounded hover:border-blue-400 hover:text-blue-500 transition-colors w-full text-sm"
          >
            <i class="fa-solid fa-plus mr-1"></i>
            Agregar otro medicamento
          </button>
        </div>

        <!-- Instrucciones generales -->
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">
            Instrucciones Generales
          </label>
          <textarea
            rows="4"
            class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none resize-none text-sm"
            placeholder="Reposo, dieta, cuidados..."
          >
Reposo relativo por 48 horas. Ingerir abundantes líquidos.</textarea
          >
        </div>
      </div>
    </div>

    <!-- Columna derecha: Preview fijo -->
    <div class="lg:border-l lg:border-gray-200 lg:pl-6 flex flex-col min-h-0">
      <div class="flex-1 flex flex-col min-h-0">
        <div class="flex items-center justify-between mb-2">
          <h3 class="text-lg font-semibold text-gray-800">Vista Previa</h3>
          <span class="text-xs text-gray-500"
            >Actualización en tiempo real</span
          >
        </div>

        <!-- Preview de la receta con scroll interno -->
        <div class="flex-1 overflow-y-auto pr-2">
          <presccription-impress />

          <!-- Botones de acción fijos en la parte inferior -->
          <div class="flex gap-2 mt-4 pt-4 border-t border-gray-200">
            <button
              type="button"
              class="flex-1 px-4 py-2 border border-gray-300 text-gray-700 rounded-lg hover:bg-gray-50 transition-colors text-sm"
            >
              <i class="fa-solid fa-rotate mr-1"></i>
              Actualizar
            </button>
            <button
              type="button"
              class="flex-1 px-4 py-2 bg-blue-500 text-white font-medium rounded-lg hover:bg-blue-600 transition-colors text-sm"
            >
              <i class="fa-solid fa-print mr-1"></i>
              Imprimir
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
