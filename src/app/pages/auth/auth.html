<main class="w-screen h-screen bg-gray-50">
  <section class="h-full flex flex-col">
    <!-- Header -->
    <header
      class="h-16 bg-white border-b border-gray-200 flex items-center px-4 lg:px-6 justify-between"
    >
      <div class="flex items-center gap-4">
        <button
          class="flex items-center justify-center p-2 rounded-lg w-9 h-9 hover:bg-gray-100 transition-colors lg:hidden"
        >
          <i class="fa-solid fa-bars text-gray-600"></i>
        </button>
        <h1 class="text-xl font-semibold text-gray-800">VitaCare</h1>
      </div>

      <div class="flex items-center gap-3 bg-gray-100 p-2 rounded-lg">
        <button
          type="button"
          (click)="setUserType('doctor')"
          [class]="userType() === 'doctor' 
            ? 'bg-white py-0.5 px-2 rounded-lg text-sm font-medium text-gray-700 shadow-sm' 
            : 'bg-transparent py-0.5 px-2 rounded-lg text-sm font-medium text-gray-500 hover:text-gray-700'"
        >
          Doctor
        </button>
        <button
          type="button"
          (click)="setUserType('admin')"
          [class]="userType() === 'admin' 
            ? 'bg-white py-0.5 px-2 rounded-lg text-sm font-medium text-gray-700 shadow-sm' 
            : 'bg-transparent py-0.5 px-2 rounded-lg text-sm font-medium text-gray-500 hover:text-gray-700'"
        >
          Administrador
        </button>
      </div>
    </header>

    <!-- Contenido Centrado -->
    <div class="flex-1 flex items-center justify-center p-6">
      <div class="w-full max-w-md p-8">
        <div class="text-center mb-8">
          <h2 class="text-3xl font-bold text-gray-800 mb-2">
            Bienvenido de vuelta!
          </h2>
          <span class="text-gray-600 text-lg">
            Inicia sesión para acceder a la plataforma
          </span>
        </div>

        <!-- Mensaje de error -->
        @if (error()) {
        <div class="mb-4 text-sm text-red-600">{{ error() }}</div>
        }

        <!-- Formulario -->
        <form class="space-y-6" (submit)="onSubmit($event)">
          <!-- Email -->
          <div class="space-y-2">
            <label for="email" class="block text-sm font-medium text-gray-700">
              Correo
            </label>
            <input
              type="email"
              id="email"
              class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all placeholder-gray-400"
              placeholder="john.doe@company.com"
              required
              [value]="email()"
              (input)="onEmailInput($event)"
            />
          </div>

          <!-- Contraseña -->
          <div class="space-y-2">
            <label
              for="password"
              class="block text-sm font-medium text-gray-700"
            >
              Contraseña
            </label>
            <div class="relative">
              <input
                [type]="showPassword ? 'text' : 'password'"
                id="password"
                class="w-full px-4 py-3 pr-10 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all placeholder-gray-400"
                placeholder="•••••••••"
                required
                [value]="password()"
                (input)="onPasswordInput($event)"
              />
              <button
                type="button"
                (click)="togglePasswordVisibility()"
                class="absolute inset-y-0 right-0 flex items-center pr-3"
              >
                <i
                  [class]="showPassword ? 'fa-solid fa-eye-slash text-gray-400 hover:text-gray-600' : 'fa-solid fa-eye text-gray-400 hover:text-gray-600'"
                  class="transition-colors"
                ></i>
              </button>
            </div>
          </div>

          <!-- Recordar -->
          <div class="flex items-center space-x-3">
            <a
              href="#"
              class="text-sm text-blue-500 hover:text-blue-600 transition-colors"
            >
              ¿Olvidaste tu contraseña?
            </a>
          </div>

          <!-- Botón -->
          <button
            type="submit"
            class="w-full py-3 bg-black text-white font-medium rounded-lg hover:bg-blue-600 transition-colors shadow-sm disabled:opacity-60"
            [disabled]="loading()"
          >
            @if (!loading()) { Iniciar Sesión } @else { Procesando... }
          </button>

          <!-- Enlace -->
          @if (userType() === 'doctor') {
          <div class="text-center">
            <a
              routerLink="/auth/register"
              class="text-sm text-blue-500 hover:text-blue-600 transition-colors"
            >
              No tienes cuenta? Crea una aqui.
            </a>
          </div>
          }
        </form>
      </div>
    </div>
  </section>
</main>
