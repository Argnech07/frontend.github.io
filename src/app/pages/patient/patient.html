<main class="h-screen w-screen flex flex-col md:flex-row">
  <!-- Navigation bar -->
  <aside
    class="flex md:flex-col flex-row md:w-20 md:h-full bg-white w-full items-center justify-between md:justify-start border-r border-gray-300"
  >
    <!-- Logo (arriba en desktop, izquierda en mobile) -->
    <div class="hidden md:flex flex-col items-center p-4 md:mb-8">
      <img
        src="favicon.ico"
        alt="Logo"
        class="aspect-square w-10 h-10 mb-2"
        loading="eager"
      />
      <span class="text-sm font-medium">VitaCare</span>
    </div>

    <!-- Navegación principal (centro) -->
    <navbar [items]="items" class="flex-1" />

    <!-- Botones de acción (abajo en desktop, derecha en mobile) -->
    <div
      class="flex md:flex-col flex-row md:space-y-4 md:mt-auto md:mb-6 md:px-2 space-x-4 md:space-x-0"
    >
      <button
        (click)="createAttention()"
        class="flex flex-col items-center justify-center w-12 h-12 hover:bg-gray-100 rounded-lg transition-all group"
      >
        <i
          class="fa-solid fa-plus text-lg text-gray-600 group-hover:text-blue-600 group-hover:scale-110 transition-all"
        ></i>
        <span class="text-xs mt-1 text-gray-500 hidden md:block">Crear</span>
      </button>
      <button
        (click)="goBack()"
        class="flex flex-col items-center justify-center w-12 h-12 hover:bg-gray-100 rounded-lg transition-all group"
      >
        <i
          class="fa-solid fa-arrow-left text-lg text-gray-600 group-hover:text-blue-600 group-hover:scale-110 transition-all"
        ></i>
        <span class="text-xs mt-1 text-gray-500 hidden md:block">Regresar</span>
      </button>
    </div>
  </aside>

  <!-- Principal content -->
  <article class="h-full w-full">
    <router-outlet />
  </article>
</main>
