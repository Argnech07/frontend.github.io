<main class="h-screen w-screen flex flex-col">
  <header
    class="h-20 bg-white border-b border-gray-200 flex items-center px-6 justify-between"
  >
    <div class="flex items-center gap-6">
      <button
        class="flex items-center justify-center p3 rounded-lg w-9 h-9 hover:bg-gray-100 transition-colors lg:hidden"
      >
        <i class="fa-solid fa-bars text-gray-600 text-lg"></i>
      </button>
      <div class="flex items-center gap-3">
        <h1 class="text-2xl font-bold text-gray-800">VitaCare</h1>
      </div>
    </div>

    <div class="flex items-center gap-4">
      <div class="hidden sm:flex items-center gap-3 rounded-xl px-4 py-2">
        <div
          class="w-9 h-9 bg-blue-500 rounded-full flex items-center justify-center text-white font-semibold shadow-sm"
        >
          {{ (doctorSvc.doctor()| FullNamePipe).slice(0, 2) || 'DR' }}
        </div>
        <div class="flex flex-col">
          <span class="text-sm font-semibold text-gray-800">
            Dr. {{ (doctorSvc.doctor()| FullNamePipe)}}
          </span>
          <span class="text-xs text-gray-500">
            {{ doctorSvc.specialty() || 'Médico' }}
          </span>
        </div>
      </div>

      <button
        class="flex items-center justify-center p-3 rounded-lg w-9 h-9 hover:bg-red-50 transition-colors group border border-gray-200"
        (click)="logout()"
      >
        <i
          class="fa-solid fa-right-from-bracket text-gray-600 group-hover:text-red-500 text-lg"
        ></i>
      </button>
    </div>
  </header>

  <section class="flex-1 flex">
    <nav class="hidden lg:flex lg:w-64 border-r border-gray-200 p-6 flex-col">
      <h2 class="text-sm font-medium text-gray-500 mb-6">Menu</h2>

      <div class="space-y-3">
        <a
          routerLink="agenda"
          routerLinkActive="bg-blue-50 border-l-4 border-blue-500 text-blue-800 rounded-r-lg"
          class="flex items-center gap-4 px-4 py-3 transition-colors text-gray-700 hover:bg-gray-50 hover:text-blue-600 font-medium"
        >
          <i class="fa-solid fa-calendar w-5 text-lg"></i>
          <span>Agenda</span>
        </a>

        <a
          routerLink="patient-list"
          routerLinkActive="bg-blue-50 border-l-4 border-blue-500 text-blue-800 rounded-r-lg"
          class="flex items-center gap-4 px-4 py-3 transition-colors text-gray-700 hover:bg-gray-50 hover:text-blue-600 font-medium"
        >
          <i class="fa-solid fa-user-injured w-5 text-lg"></i>
          <span>Pacientes</span>
        </a>

        <a
          routerLink="/dashboard/estadisticas"
          routerLinkActive="bg-blue-50 border-l-4 border-blue-500 text-blue-800 rounded-r-lg"
          class="flex items-center gap-4 px-4 py-3 transition-colors text-gray-700 hover:bg-gray-50 hover:text-blue-600 font-medium"
        >
          <i class="fa-solid fa-chart-bar w-5 text-lg"></i>
          <span>Estadísticas</span>
        </a>
      </div>
    </nav>

    <div class="flex-1 bg-white p-6 overflow-auto">
      <router-outlet />
    </div>
  </section>
</main>
