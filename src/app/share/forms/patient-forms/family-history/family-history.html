<div class="max-w-4xl mx-auto p-6">
  <!-- Header -->
  <div class="text-center mb-8">
    <h3 class="text-2xl font-bold text-gray-800 mb-2">
      Antecedentes Heredofamiliares
    </h3>
    <span class="text-gray-600">
      Marque las enfermedades que se presentan en el historial familiar
    </span>
  </div>

  <!-- Formulario -->
  <form class="space-y-8" [formGroup]="form" (ngSubmit)="submit()">
    <!-- Enfermedades -->
    <div class="bg-white rounded-lg border border-gray-200 p-6">
      <h4
        class="text-lg font-semibold text-gray-800 mb-6 flex items-center gap-2"
      >
        <i class="fa-solid fa-heart-pulse text-blue-500"></i>
        Historial Familiar de Enfermedades
      </h4>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <!-- Diabetes -->
        <label
          class="flex items-center p-4 border border-gray-200 rounded-lg hover:bg-gray-50 cursor-pointer transition-colors"
        >
          <input
            type="checkbox"
            formControlName="diabetes"
            class="w-5 h-5 text-blue-600 border-gray-300 rounded focus:ring-blue-500"
          />
          <span class="ml-3 text-gray-700 font-medium">Familiares con diabetes</span>
        </label>

        <!-- Cáncer de Mama -->
        <label
          class="flex items-center p-4 border border-gray-200 rounded-lg hover:bg-gray-50 cursor-pointer transition-colors"
        >
          <input
            type="checkbox"
            formControlName="breast_cancer"
            class="w-5 h-5 text-blue-600 border-gray-300 rounded focus:ring-blue-500"
          />
          <span class="ml-3 text-gray-700 font-medium">Familiares con cáncer de mama</span>
        </label>

        <!-- Otros Cánceres -->
        <label
          class="flex items-center p-4 border border-gray-200 rounded-lg hover:bg-gray-50 cursor-pointer transition-colors"
        >
          <input
            type="checkbox"
            formControlName="other_cancers"
            class="w-5 h-5 text-blue-600 border-gray-300 rounded focus:ring-blue-500"
          />
          <span class="ml-3 text-gray-700 font-medium">Familiares otro Tipo de Cancer</span>
        </label>

        <!-- Hipertensión -->
        <label
          class="flex items-center p-4 border border-gray-200 rounded-lg hover:bg-gray-50 cursor-pointer transition-colors"
        >
          <input
            type="checkbox"
            formControlName="hypertension"
            class="w-5 h-5 text-blue-600 border-gray-300 rounded focus:ring-blue-500"
          />
          <span class="ml-3 text-gray-700 font-medium">Familiares con hipertensión</span>
        </label>

        <!-- Tuberculosis -->
        <label
          class="flex items-center p-4 border border-gray-200 rounded-lg hover:bg-gray-50 cursor-pointer transition-colors"
        >
          <input
            type="checkbox"
            formControlName="tuberculosis"
            class="w-5 h-5 text-blue-600 border-gray-300 rounded focus:ring-blue-500"
          />
          <span class="ml-3 text-gray-700 font-medium">Familiares con tuberculosis</span>
        </label>

        <!-- Cardiopatías -->
        <label
          class="flex items-center p-4 border border-gray-200 rounded-lg hover:bg-gray-50 cursor-pointer transition-colors"
        >
          <input
            type="checkbox"
            formControlName="cardiopathies"
            class="w-5 h-5 text-blue-600 border-gray-300 rounded focus:ring-blue-500"
          />
          <span class="ml-3 text-gray-700 font-medium">Familiares con cardiopatías</span>
        </label>

        <!-- Problemas Renales -->
        <label
          class="flex items-center p-4 border border-gray-200 rounded-lg hover:bg-gray-50 cursor-pointer transition-colors"
        >
          <input
            type="checkbox"
            formControlName="renal_disease"
            class="w-5 h-5 text-blue-600 border-gray-300 rounded focus:ring-blue-500"
          />
          <span class="ml-3 text-gray-700 font-medium">Familiares con problemas renales</span>
        </label>

        <!-- Alergias -->
        <label
          class="flex items-center p-4 border border-gray-200 rounded-lg hover:bg-gray-50 cursor-pointer transition-colors"
        >
          <input
            type="checkbox"
            formControlName="allergies"
            class="w-5 h-5 text-blue-600 border-gray-300 rounded focus:ring-blue-500"
          />
          <span class="ml-3 text-gray-700 font-medium">Familiares con alergias</span>
        </label>

        <!-- Osteoporosis -->
        <label
          class="flex items-center p-4 border border-gray-200 rounded-lg hover:bg-gray-50 cursor-pointer transition-colors"
        >
          <input
            type="checkbox"
            formControlName="osteoporosis"
            class="w-5 h-5 text-blue-600 border-gray-300 rounded focus:ring-blue-500"
          />
          <span class="ml-3 text-gray-700 font-medium">Familiares con osteoporosis</span>
        </label>

        <!-- Trastornos Hemorrágicos -->
        <label
          class="flex items-center p-4 border border-gray-200 rounded-lg hover:bg-gray-50 cursor-pointer transition-colors"
        >
          <input
            type="checkbox"
            formControlName="bleeding_disorders"
            class="w-5 h-5 text-blue-600 border-gray-300 rounded focus:ring-blue-500"
          />
          <span class="ml-3 text-gray-700 font-medium">
            Familiares con trastornos hemorrágicos
          </span>
        </label>

        <!-- Tabaquismo -->
        <label
          class="flex items-center p-4 border border-gray-200 rounded-lg hover:bg-gray-50 cursor-pointer transition-colors"
        >
          <input
            type="checkbox"
            formControlName="smoking"
            class="w-5 h-5 text-blue-600 border-gray-300 rounded focus:ring-blue-500"
          />
          <span class="ml-3 text-gray-700 font-medium">Familiares con tabaquismo</span>
        </label>

        <!-- Otras Adicciones -->
        <label
          class="flex items-center p-4 border border-gray-200 rounded-lg hover:bg-gray-50 cursor-pointer transition-colors"
        >
          <input
            type="checkbox"
            formControlName="addictions"
            class="w-5 h-5 text-blue-600 border-gray-300 rounded focus:ring-blue-500"
          />
          <span class="ml-3 text-gray-700 font-medium">Familiares con otras adicciones</span>
        </label>
      </div>

      <!-- Otros -->
      <div class="mt-6 space-y-2">
        <label class="block text-sm font-medium text-gray-700">
          Otros antecedentes
        </label>
        <textarea
          rows="3"
          formControlName="other"
          class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all resize-none placeholder-gray-400"
          placeholder="Especifique otros antecedentes familiares relevantes..."
        ></textarea>
      </div>
    </div>

    <!-- Botones de acción -->
    <div class="flex justify-end gap-4 pt-6 border-t border-gray-200">
      <button
        type="submit"
        [disabled]="isLoading()"
        class="px-8 py-3 bg-blue-500 text-white font-medium rounded-lg hover:bg-blue-600 transition-colors disabled:opacity-50 disabled:cursor-not-allowed"
      >
        <i class="fa-solid fa-save mr-2"></i>
        @if (isLoading()) {
        <span>Guardando...</span>
        } @else {
        <span>Guardar</span>
        }
      </button>
    </div>
  </form>
</div>
